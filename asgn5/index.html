<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignment 5</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #css3d-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #info {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #cc88ff;
      font-size: 13px;
      background: rgba(0,0,0,0.5);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #6633aa;
      text-align: center;
    }

    /* TV Screen */
    #monitor-browser {
      width: 890px;
      height: 473px;
      display: flex;
    }
    #browser-iframe {
      flex: 1;
      border: none;
      background: #000;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="css3d-container"></div>

  <div id="info">TV turns on & off (click on remote) | Left-drag: pan | Scroll: zoom | Right-drag: orbit</div>

  <!--
    TV SCREEN
  -->
    <!-- Spongebob -->
    <!-- src="https://www.youtube.com/embed/xRfwXBitjc8?autoplay=1&mute=1&loop=1&controls=0&playlist=xRfwXBitjc8&modestbranding=1&start=7165" -->
     <!-- campfire -->
     <!-- src="https://www.youtube.com/embed/L_LUpnjgPso?autoplay=1&mute=1&loop=1&controls=0&playlist=L_LUpnjgPso&modestbranding=1" -->
  <div id="monitor-browser">
    <iframe id="browser-iframe"
            src="https://www.youtube.com/embed/xRfwXBitjc8?autoplay=1&mute=1&loop=1&controls=0&playlist=xRfwXBitjc8&modestbranding=1&start=7165"
            sandbox="allow-scripts allow-same-origin">
    </iframe>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
